name: Update Jio Tokens in kid.json

on:
  schedule:
    - cron: '0 */11 * * *'  # Runs every 11 hours
  workflow_dispatch:        # Allows manual run from the Actions tab

jobs:
  update-json-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Fetch and Extract JioTV Token
      id: fetch_jio
      run: |
        # Fetch the JSON source with a User-Agent to avoid blocks
        curl -sL -H "User-Agent: Mozilla/5.0" "https://allinonereborn.online/jstrweb2/jstr.json" -o jstr.json
        
        # 1. Search every string value in the JSON for the token
        # 2. Extract only the __hdnea__ part
        # 3. Stop at common delimiters like quotes, pipes, or spaces
        JIO_TOKEN=$(jq -r '.. | strings? | select(contains("__hdnea__="))' jstr.json | grep -o '__hdnea__=[^"&| ]*' | head -n1)
        
        if [ -z "$JIO_TOKEN" ]; then
          echo "Error: Jio token could not be extracted. Current jstr.json content:"
          cat jstr.json | head -n 50
          exit 1
        fi
        
        echo "Successfully extracted token: $JIO_TOKEN"
        echo "JIO_TOKEN=$JIO_TOKEN" >> $GITHUB_ENV

    - name: Update kid.json
      run: |
        # Map through the channels and update those matching the Jio CDN
        # Also sets the 'cookie' field to the exact format you requested
        jq --arg jio "$JIO_TOKEN" '
          .channels |= map(
            if (.stream_url | test("jiotvmblive.cdn.jio.com")) then
              .cookie = $jio |
              .stream_url = (.stream_url | sub("\\?.*$"; "") + "?" + $jio)
            else
              .
            end
          )
        ' kid.json > temp.json && mv temp.json kid.json

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add kid.json
        
        # Only commit if the file actually changed
        if git commit -m "Auto-update Jio token from jstr.json"; then
          git pull --rebase --autostash origin main
          git push
        else
          echo "No changes detected in kid.json"
        fi
