name: Update Jio Tokens in kid.json

on:
  schedule:
    - cron: '0 */11 * * *'
  workflow_dispatch:

jobs:
  update-json-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Fetch JioTV token
      id: fetch_jio
      run: |
        # Fetch the new JSON source
        curl -sL "https://allinonereborn.online/jstrweb2/jstr.json" -o jstr.json
        
        # Extract the __hdnea__ token from the first stream_url found in the JSON
        # This looks for the string starting with __hdnea__ and ending before a quote or pipe
        JIO_TOKEN=$(jq -r '.. | .stream_url? // empty' jstr.json | grep -o '__hdnea__=[^"]*' | head -n1)
        
        if [ -z "$JIO_TOKEN" ]; then
          echo "Error: Jio token could not be extracted from JSON."
          exit 1
        fi
        
        echo "JIO_TOKEN=$JIO_TOKEN" >> $GITHUB_ENV

    - name: Update kid.json
      run: |
        jq --arg jio "$JIO_TOKEN" '
          .channels |= map(
            if (.stream_url | test("jiotvmblive.cdn.jio.com")) then
              .cookie = $jio |
              .stream_url = (.stream_url | sub("\\?.*$"; "") + "?" + $jio)
            else
              .
            end
          )
        ' kid.json > temp.json && mv temp.json kid.json

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add kid.json
        if git commit -m "Auto-update Jio token from jstr.json"; then
          git pull --rebase --autostash origin main
          git push
        else
          echo "No changes to commit"
        fi
