name: Extract HDNEA Token

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Value
        id: get_token
        run: |
          # Fetch JSON and filter by the "token" field
          RAW_DATA=$(curl -s https://allinonereborn.online/jstrweb2/jstr.json)
          
          # This jq filter finds the object where token is __hdnea__ 
          # and pulls the 'value' field. Adjust '.value' if the field has a different name.
          VALUE=$(echo $RAW_DATA | jq -r '.[] | select(.token == "__hdnea__") | .value')

          if [ "$VALUE" == "null" ] || [ -z "$VALUE" ]; then
            echo "Error: Could not find value for token __hdnea__"
            exit 1
          fi

          echo "HDNEA_VALUE=$VALUE" >> $GITHUB_ENV
          echo "Successfully extracted token."

      - name: Debug Output
        run: echo "The extracted token is ${{ env.HDNEA_VALUE }}"
