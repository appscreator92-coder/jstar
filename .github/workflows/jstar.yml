name: Extract HDNEA Value

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '0 * * * *' # Optional: Runs every hour

jobs:
  extract_data:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch JSON and Extract __hdnea__
        run: |
          # 1. Fetch the JSON data
          # 2. Use jq to find the object where "name" is "__hdnea__"
          # 3. Extract the "value" field from that object
          HDNEA_VALUE=$(curl -s https://allinonereborn.online/jstrweb2/jstr.json | jq -r '.[] | select(.name == "__hdnea__") | .value')
          
          # Check if value was found
          if [ -z "$HDNEA_VALUE" ]; then
            echo "Error: __hdnea__ not found in the JSON response."
            exit 1
          fi
          
          echo "Extracted Value: $HDNEA_VALUE"
          
          # Save to Environment Variable for subsequent steps
          echo "HDNEA_TOKEN=$HDNEA_VALUE" >> $GITHUB_ENV

      - name: Use the extracted value
        run: |
          echo "The token extracted in the previous step is: ${{ env.HDNEA_TOKEN }}"
