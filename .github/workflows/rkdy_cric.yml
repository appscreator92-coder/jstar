name: RKDY Auto Update

on:
  schedule:
    # Har 15 minute mein automatically chalega
    - cron: '*/15 * * * *'
  workflow_dispatch: # Manual button ke liye

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run RKDY Script
        env:
          RKDY_CRIC: ${{ secrets.RKDY_CRIC }}
        # Tera script path Playlist folder ke andar hai
        run: python Playlist/rkdy_cric.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Playlist/Cricket.m3u/index.html
          git commit -m "Playlist Updated: $(date)" || exit 0
          git push
          
